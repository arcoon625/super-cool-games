<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Set canvas size
        canvas.width = 1024;
        canvas.height = 768;

        // Game Constants
        const KEYS = {
            LEFT: 'ArrowLeft',
            UP: 'ArrowUp',
            RIGHT: 'ArrowRight',
            DOWN: 'ArrowDown',
            SHIFT: 'Shift',
            SHOOT: 's',
            SHOOT_CAP: 'S',
            RELOAD: 'r',
            RELOAD_CAP: 'R',
            GRENADE: 'g',
            GRENADE_CAP: 'G',
            KEY_1: '1',
            KEY_2: '2',
            KEY_3: '3',
            ESC: 'Escape'
        };

        const BLOCK_SIZE = 40;
        const FOV = Math.PI / 3;
        const SCREEN_DIST = (canvas.width / 2) / Math.tan(FOV / 2);

        // Define Types for clarity
        // types: infantry, tank, plane, mecha, command_mecha, armed_tank, nuke_sub, nuke_tank

        // Image Loading (Procedural Fallback since GenAI is busy)
        const soldierImg = new Image();

        function generateSoldierTexture() {
            const size = 128; // High res sprite
            const c = document.createElement('canvas');
            c.width = size;
            c.height = size;
            const ctx = c.getContext('2d');

            // 1. Camo Pattern Background
            ctx.fillStyle = '#C2B280'; // Desert Base
            ctx.fillRect(0, 0, size, size);
            // Noise
            for (let i = 0; i < 500; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? '#8b4513' : '#a0522d';
                ctx.globalAlpha = 0.4;
                ctx.beginPath();
                ctx.arc(Math.random() * size, Math.random() * size, Math.random() * 10, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1.0;

            // Masking for body shape to keep camo only on body? 
            // Better: Draw body parts using Camo Pattern
            const camoPattern = ctx.createPattern(c, 'no-repeat');

            ctx.clearRect(0, 0, size, size); // Clear temp noise

            // Helper to draw camo rect
            function drawCamoRect(x, y, w, h) {
                ctx.save();
                ctx.translate(x, y);
                ctx.fillStyle = '#8B4513'; // Fallback
                // Re-generate local noise or just nice colors
                ctx.fillStyle = '#6d5e48'; // Darker sand
                ctx.fillRect(0, 0, w, h);
                // Add detail
                ctx.fillStyle = '#8b4513';
                for (let k = 0; k < 10; k++) ctx.fillRect(Math.random() * w, Math.random() * h, 4, 4);
                ctx.restore();
            }

            // Draw Structure (Front View)
            const cx = size / 2;

            // Boots
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(cx - 20, size - 20, 15, 20);
            ctx.fillRect(cx + 5, size - 20, 15, 20);

            // Legs (Camo)
            drawCamoRect(cx - 20, size - 60, 18, 40);
            drawCamoRect(cx + 2, size - 60, 18, 40);

            // Torso (Camo + Vest)
            drawCamoRect(cx - 22, size - 100, 44, 45);
            // Tactical Vest
            ctx.fillStyle = '#2F4F4F'; // Dark Slate Gray
            ctx.fillRect(cx - 20, size - 95, 40, 25);
            // Pouches
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(cx - 15, size - 90, 8, 10);
            ctx.fillRect(cx - 2, size - 90, 8, 10);
            ctx.fillRect(cx + 10, size - 90, 8, 10);

            // Head
            ctx.fillStyle = '#eec'; // Skin
            ctx.fillRect(cx - 10, size - 125, 20, 25);

            // Helmet
            ctx.fillStyle = '#4b5320'; // Army Green
            ctx.beginPath();
            ctx.arc(cx, size - 120, 14, Math.PI, 0);
            ctx.fill();
            ctx.fillRect(cx - 14, size - 120, 28, 5);
            // Goggles
            ctx.fillStyle = '#111';
            ctx.fillRect(cx - 10, size - 117, 20, 6);
            ctx.fillStyle = '#555'; // Lens reflection
            ctx.fillRect(cx - 8, size - 116, 6, 3);
            ctx.fillRect(cx + 2, size - 116, 6, 3);

            // Arms
            drawCamoRect(cx - 35, size - 98, 12, 35); // Left
            drawCamoRect(cx + 23, size - 98, 12, 35); // Right

            // Gun (Black Rifle)
            ctx.fillStyle = '#080808';
            ctx.save();
            ctx.translate(cx - 20, size - 75);
            ctx.rotate(-0.1);
            ctx.fillRect(0, 0, 50, 8); // Main body
            ctx.fillRect(10, 8, 5, 8); // Mag
            ctx.fillRect(35, 0, 2, -4); // Sight
            ctx.fillRect(0, 0, -10, 4); // Stock
            ctx.restore();

            // Hands
            ctx.fillStyle = '#222'; // Gloves
            ctx.fillRect(cx - 15, size - 75, 10, 10);
            ctx.fillRect(cx + 15, size - 70, 10, 10);

            return c.toDataURL();
        }

        soldierImg.src = generateSoldierTexture();
        let soldierImgLoaded = true; // Data URL loads instantly usually, but onload handles async if needed
        soldierImg.onload = () => { soldierImgLoaded = true; };

        function buyItem(id) {
            // Debounce or simple click
            if (id === 1) { // Heal $1
                if (game.money >= 1) {
                    game.money -= 1;
                    const p = getPlayer();
                    if (p) {
                        if (p.type === 'nuke_tank') p.health = 50000;
                        else if (p.type === 'nuke_sub') p.health = 20000;
                        else if (p.type === 'armed_tank') p.health = 10000;
                        else if (p.type === 'command_mecha') p.health = 5000;
                        else if (p.type === 'mecha') p.health = 2000;
                        else if (p.type === 'plane') p.health = 1000;
                        else if (p.type === 'tank') p.health = 500;
                        else p.health = 100;
                    }
                }
            }
            if (id === 2) { // Reinforcement $3
                if (game.money >= 3) {
                    game.money -= 3;
                    game.soldiers.push(new Soldier(100, 100 + Math.random() * 500, 'green', true));
                }
            }
            if (id === 3) { // Machine Gun $5
                if (game.money >= 5 && !game.hasMachineGun) {
                    game.money -= 5;
                    game.hasMachineGun = true;
                    const p = getPlayer();
                    if (p) {
                        p.fireRate = 50;
                        p.maxAmmo = 100;
                        p.ammo = 100;
                    }
                }
            }
            if (id === 4) { // Grenade Refill $2
                if (game.money >= 2) {
                    game.money -= 2;
                    const p = getPlayer();
                    if (p) p.grenades = 3;
                }
            }
            if (id === 5) { // Speed Boost $4
                if (game.money >= 4) {
                    game.money -= 4;
                    const p = getPlayer();
                    if (p) p.speed += 1;
                }
            }
            if (id === 6) { // Max HP Upgrade $6
                if (game.money >= 6) {
                    game.money -= 6;
                    const p = getPlayer();
                    if (p) {
                        // Should we track base Max HP separately to persist through transformations? 
                        // For simplicity, just add to current. 
                        // Ideally, Soldier has a permanent stat buffer.
                        // Let's just buff current health and " overheal"
                        p.health += 50;
                        // Hacky permanent max HP tracking? 
                        // Use a custom prop.
                        if (!p.extraMaxHp) p.extraMaxHp = 0;
                        p.extraMaxHp += 50;
                    }
                }
            }
            if (id === 7) { // Air Strike $10
                if (game.money >= 10) {
                    game.money -= 10;
                    // Wipe enemies
                    game.soldiers.forEach(s => {
                        if (s.team === 'red') s.takeDamage(9999);
                    });
                }
            }
            if (id === 8) { // Land Mine $2
                if (game.money >= 2) {
                    game.money -= 2;
                    const p = getPlayer();
                    if (p) {
                        game.mines.push(new Mine(p.pos.x, p.pos.y, p.team));
                    }
                }
            }
            if (id === 9) { // Deploy Turret $6
                if (game.money >= 6) {
                    game.money -= 6;
                    const p = getPlayer();
                    if (p) {
                        const t = new Soldier(p.pos.x, p.pos.y, 'green', true);
                        t.type = 'turret'; // Custom type for visuals/logic
                        t.speed = 0;
                        t.health = 500;
                        t.fireRate = 100; // Fast
                        t.maxAmmo = 9999;
                        t.ammo = 9999;
                        // Push away from player slightly so they don't get stuck
                        t.pos.x += 30;
                        game.soldiers.push(t);
                    }
                }
            }
            if (id === 10) { // Invincibility $8
                if (game.money >= 8) {
                    game.money -= 8;
                    const p = getPlayer();
                    if (p) {
                        p.invincibleTimer += 10000; // 10 seconds
                    }
                }
            }
        }

        // Game State
        const game = {
            keys: {},
            lastTime: 0,
            active: true,
            width: 1024,
            height: 768,
            bullets: [],
            grenades: [],
            mines: [], // NEW
            walls: [],
            soldiers: [],
            // Economy & Shop
            money: 0,
            shopActive: false,
            hasMachineGun: false,
            wave: 1,
            waveState: 'active', // active, waiting
            viewMode: '3d', // top or 3d
            waveTimer: 0,

            // Game Flow
            started: false,
            mode: 'desert', // 'land', 'sea', 'desert'

            // Weapon System
            weaponShopActive: false,
            ownedWeapons: ['pistol'], // Start with pistol
            currentWeapon: 'pistol'   // pistol, machinegun, shotgun, sniper, rpg, minigun, laser, plasma, flamethrower, autocannon, homing, railgun
        };

        const WEAPONS = {
            pistol: { name: 'Pistol', price: 0, fireRate: 400, damage: 25, speed: 15, color: 'yellow' },
            machinegun: { name: 'Machine Gun', price: 5, fireRate: 100, damage: 20, speed: 18, color: 'orange' },
            shotgun: { name: 'Shotgun', price: 15, fireRate: 800, damage: 15, speed: 15, count: 5, spread: 0.3, color: 'gray' },
            sniper: { name: 'Sniper Rifle', price: 20, fireRate: 1000, damage: 200, speed: 40, color: 'white' },
            rpg: { name: 'RPG', price: 30, fireRate: 1500, damage: 300, speed: 12, isRocket: true, radius: 8, color: 'darkred' },
            minigun: { name: 'Minigun', price: 50, fireRate: 40, damage: 15, speed: 20, color: 'yellow' },
            laser: { name: 'Laser Gun', price: 75, fireRate: 600, damage: 150, speed: 60, color: 'cyan' },
            rpg: { name: 'RPG', price: 30, fireRate: 1500, damage: 300, speed: 12, isRocket: true, radius: 8, color: 'darkred' },
            minigun: { name: 'Minigun', price: 50, fireRate: 40, damage: 15, speed: 20, color: 'yellow' },
            laser: { name: 'Laser Gun', price: 75, fireRate: 600, damage: 150, speed: 60, color: 'cyan' },
            plasma: { name: 'Plasma Gun', price: 100, fireRate: 500, damage: 400, speed: 8, radius: 10, color: 'magenta' },
            flamethrower: { name: 'Flamethrower', price: 45, fireRate: 30, damage: 5, speed: 10, isFlamethrower: true, radius: 20, color: 'orange' },
            autocannon: { name: 'Auto-Cannon', price: 55, fireRate: 300, damage: 60, speed: 25, isExplosive: true, radius: 4, color: 'red' },
            homing: { name: 'Homing Launcher', price: 65, fireRate: 1200, damage: 120, speed: 15, isHoming: true, radius: 6, color: 'lime' },
            railgun: { name: 'Railgun', price: 85, fireRate: 1500, damage: 500, speed: 60, isPiercing: true, radius: 3, color: 'white' }
        };

        function buyWeapon(key) {
            const w = WEAPONS[key];
            if (!w) return;

            if (game.ownedWeapons.includes(key)) {
                // Already own, just equip
                game.currentWeapon = key;
                return;
            }

            if (game.money >= w.price) {
                game.money -= w.price;
                game.ownedWeapons.push(key);
                game.currentWeapon = key;

                // Stats update for machinegun logic fallback
                if (key === 'machinegun') game.hasMachineGun = true;
            }
        }

        class Wall {
            constructor(x, y, width, height) {
                this.x = x;
                this.y = y;
                this.width = width;
                this.height = height;
            }

            draw(ctx) {
                ctx.fillStyle = '#555';
                ctx.fillRect(this.x, this.y, this.width, this.height);
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 2;
                ctx.strokeRect(this.x, this.y, this.width, this.height);

                // Details to make it look like a wall
                ctx.strokeStyle = '#444';
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x + this.width, this.y + this.height);
                ctx.moveTo(this.x + this.width, this.y);
                ctx.lineTo(this.x, this.y + this.height);
                ctx.stroke();
            }
        }

        // Initialize Game
        function createWalls() {
            game.walls = [];

            if (game.mode === 'sea') {
                // Sea Map: Islands
                // Randomly generate some islands
                for (let i = 0; i < 6; i++) {
                    const w = 50 + Math.random() * 100;
                    const h = 50 + Math.random() * 100;
                    const x = 100 + Math.random() * (game.width - 200);
                    const y = 100 + Math.random() * (game.height - 200);
                    const island = new Wall(x, y, w, h);
                    island.type = 'island'; // New type
                    island.color = '#c2b280'; // Sand
                    game.walls.push(island);
                }
            } else if (game.mode === 'desert') {
                // Desert Map: Scattered Rocks and Cactus
                // Rocks (mountains)
                for (let i = 0; i < 8; i++) {
                    const w = 40 + Math.random() * 80;
                    const h = 40 + Math.random() * 80;
                    const x = 100 + Math.random() * (game.width - 200);
                    const y = 100 + Math.random() * (game.height - 200);
                    const rock = new Wall(x, y, w, h);
                    rock.type = 'mountain';
                    rock.color = '#8b4513'; // SaddleBrown
                    game.walls.push(rock);
                }

                // Cactus (small tall walls)
                for (let i = 0; i < 15; i++) {
                    const w = 10;
                    const h = 40; // in top down, wall height is y-dim. In 3D logic we need a way to say this is thin but tall?
                    // our wall class is 2D footprint.
                    // Let's make small 10x10 footprint walls that render tall in 3D
                    const x = 50 + Math.random() * (game.width - 100);
                    const y = 50 + Math.random() * (game.height - 100);
                    const cactus = new Wall(x, y, 15, 15);
                    cactus.type = 'cactus';
                    cactus.color = '#2e8b57'; // SeaGreen
                    game.walls.push(cactus);
                }

            } else {
                // Land Map
                game.walls.push(new Wall(200, 200, 50, 200));
                game.walls.push(new Wall(500, 400, 200, 50));
                game.walls.push(new Wall(700, 100, 50, 300));
                game.walls.push(new Wall(100, 600, 300, 50));
                game.walls.push(new Wall(600, 600, 50, 50));

                // Add Water Zone (Bottom River)
                const river = new Wall(0, 700, 1024, 68);
                river.type = 'water';
                river.color = '#3366ff';
                game.walls.push(river);
            }
        }

        function initGame(mode) {
            game.mode = mode || 'land';
            game.started = true;
            game.wave = 1;
            game.money = 0;
            // Walls are persistent
            createWalls();

            // ... rest of init logic (reset soldiers etc) but need to support new types
            // Clear entities
            game.soldiers = [];
            game.bullets = [];
            game.grenades = [];

            // Spawn Player (Type based on mode)
            let pType = 'infantry';
            if (game.mode === 'sea') pType = 'gunboat';
            // if desert, standard infantry is fine

            const player = new Soldier(100, 384, 'green', false);
            player.type = pType; // Set initial type
            if (game.mode === 'sea') { player.health = 200; player.radius = 20; }
            game.soldiers.push(player);

            // Spawn Allies
            const a1 = new Soldier(100, 150, 'green', true); a1.type = pType;
            const a2 = new Soldier(100, 500, 'green', true); a2.type = pType;
            game.soldiers.push(a1);
            game.soldiers.push(a2);

            startWave();
        }

        function startWave() {
            // Reward for clearing previous wave (if wave > 1)
            if (game.wave > 1) {
                game.money += 1;
            }

            // Cleanup dead enemies to prevent performance issues
            game.soldiers = game.soldiers.filter(s => s.team === 'green');

            // Difficulty Tuning: Slower progression
            // Wave 1-2: 3 enemies
            // Wave 3-4: 4 enemies
            // etc.
            // Reset Walls (Respawn destroyed walls)
            createWalls();

            // Regular Spawn Loop (Restored)
            const enemyCount = 3 + Math.floor((game.wave - 1) / 2);
            for (let i = 0; i < enemyCount; i++) {
                // Random spawn on right side
                // Ensure not inside wall (simple range check)
                let ex = 800 + Math.random() * 200;
                let ey = 100 + Math.random() * 600;
                const e = new Soldier(ex, ey, 'red', true);
                if (game.mode === 'sea') {
                    e.type = 'gunboat'; // Default Sea Enemy
                    e.radius = 20;
                }
                game.soldiers.push(e);
            }

            // Revive and Reset Green Team
            let allyIndex = 0;
            game.soldiers.forEach(s => {
                if (s.team === 'green') {
                    // Revive
                    s.active = true;
                    // Reset HP based on type? Or just full heal.
                    if (s.type === 'nuke_tank' || (game.mode === 'sea' && game.wave >= 100)) s.health = 50000;
                    else if (s.type === 'nuke_sub') s.health = 20000;
                    else if (s.type === 'armed_tank' || (game.mode === 'sea' && game.wave >= 50)) s.health = 10000;
                    else if (s.type === 'command_mecha' || (game.mode === 'sea' && game.wave >= 40)) s.health = 5000;
                    else if (s.type === 'mecha') s.health = 2000;
                    else if (s.type === 'plane' || (game.mode === 'sea' && game.wave >= 20)) s.health = 1000;
                    else if (s.type === 'tank' || (game.mode === 'sea' && game.wave >= 5)) s.health = 500;
                    else s.health = 100;

                    if (game.mode === 'sea' && s.health === 100) s.health = 200; // Base Gunboat hp

                    s.ammo = s.maxAmmo;
                    s.grenades = 3;

                    // Reset Position
                    if (!s.isAi) {
                        // Player
                        s.pos.x = 100;
                        s.pos.y = 384;
                        // Transform Logic
                        if (game.mode === 'land') {
                            if (game.wave >= 100) s.transformToNuclearTank();
                            else if (game.wave >= 75) s.transformToNuclearSubmarine();
                            else if (game.wave >= 50) s.transformToArmedTank();
                            else if (game.wave >= 40) s.transformToCommandMecha();
                            else if (game.wave >= 30) s.transformToMecha();
                            else if (game.wave >= 20) s.transformToPlane();
                            else if (game.wave >= 5) s.transformToTank();
                        } else {
                            // SEA MODE TRANSFORMATIONS
                            if (game.wave >= 100) s.transformToSuperCarrier();
                            else if (game.wave >= 75) s.transformToNuclearSubmarine(); // Stays same
                            else if (game.wave >= 50) s.transformToAircraftCarrier();
                            else if (game.wave >= 40) s.transformToBattleship();
                            else if (game.wave >= 20) s.transformToCruiser();
                            else if (game.wave >= 5) s.transformToDestroyer();
                        }
                    } else {
                        // Allies
                        if (allyIndex === 0) {
                            s.pos.x = 100;
                            s.pos.y = 150;
                        } else {
                            s.pos.x = 100;
                            s.pos.y = 500;
                        }
                        allyIndex++;
                    }
                }
            });

            game.waveState = 'active';
        }

        function update(deltaTime) {
            // Check for Shop Access
            // Handled via Shift+S toggle in event listener now.

            if (game.shopActive) {
                // GAME IS PAUSED IN SHOP
                return;
            }
            // ... rest of the update logic would go here ...
        }

        class Bullet {
            constructor(x, y, angle, owner) {
                this.pos = { x: x, y: y };
                this.speed = 15;
                this.angle = angle;
                this.velocity = {
                    x: Math.cos(angle) * this.speed,
                    y: Math.sin(angle) * this.speed
                };
                this.active = true;
                this.radius = 2;
                this.owner = owner;
                this.active = true;
                this.radius = 2;
                this.owner = owner;
                this.active = true;
                this.radius = 2;
                this.owner = owner;
                this.isExplosive = false; // Default
                this.isNuclear = false; // New
                this.isRocket = false;
                this.isPlasma = false;
                this.damage = 10; // Default damage carried by bullet

                // New Properties
                this.isFlamethrower = false;
                this.isHoming = false;
                this.isPiercing = false;
                this.penetration = 0; // Hits before destroying
                this.lifeTimer = 0; // For flamethrower
            }

            update() {
                if (this.isHoming && this.active) {
                    // Find nearest target
                    let closest = null;
                    let record = Infinity;
                    const targets = game.soldiers; // Simplified: target anyone not owner. Actually need to filter by team.
                    for (let s of targets) {
                        if (s.active && s.team !== this.owner.team) {
                            const d = Math.hypot(s.pos.x - this.pos.x, s.pos.y - this.pos.y);
                            if (d < record && d < 600) { // Range check
                                record = d;
                                closest = s;
                            }
                        }
                    }
                    if (closest) {
                        const desiredAngle = Math.atan2(closest.pos.y - this.pos.y, closest.pos.x - this.pos.x);
                        // Steer
                        const steerRate = 0.1;
                        let delta = desiredAngle - this.angle;
                        // Normalize delta
                        while (delta <= -Math.PI) delta += Math.PI * 2;
                        while (delta > Math.PI) delta -= Math.PI * 2;

                        this.angle += Math.max(-steerRate, Math.min(steerRate, delta));
                        this.velocity.x = Math.cos(this.angle) * this.speed;
                        this.velocity.y = Math.sin(this.angle) * this.speed;
                    }
                }

                this.pos.x += this.velocity.x;
                this.pos.y += this.velocity.y;

                if (this.isFlamethrower) {
                    this.lifeTimer++;
                    this.radius += 0.5; // Expand
                    if (this.lifeTimer > 40) this.active = false; // Short range
                }

                // Bounds check
                if (this.pos.x < 0 || this.pos.x > game.width || this.pos.y < 0 || this.pos.y > game.height) {
                    this.active = false;
                }

                // Wall Collision
                for (let i = 0; i < game.walls.length; i++) {
                    let wall = game.walls[i];
                    if (this.pos.x > wall.x && this.pos.x < wall.x + wall.width &&
                        this.pos.y > wall.y && this.pos.y < wall.y + wall.height) {

                        // Bullets fly OVER water!
                        if (this.type === 'water' && !this.isExplosive && !this.isRocket) {
                            // Simple bullets pass over. Explosive ones (tank shells)?
                            // Let's say all bullets pass over water for now.
                            continue;
                        }

                        if (!this.isPiercing) {
                            this.active = false; // Bullet is destroyed on impact unless it's water
                        }

                        if (this.isExplosive || this.isRocket || this.isPlasma) {
                            this.explode();
                        }

                        if (wall.type !== 'mountain' && wall.type !== 'water') {
                            wall.hp -= 25; // Damage destructible walls
                            if (this.isExplosive) wall.hp -= 200; // Big damage to walls
                            if (wall.hp <= 0) {
                                game.walls.splice(i, 1);
                                i--; // Adjust index after removal
                            }
                        }
                        break; // Bullet hit something, stop checking walls
                    }
                }

                // Soldier Collision
                if (this.active) {
                    for (let s of game.soldiers) {
                        if (s.active && s !== this.owner) { // Friendly Fire Enabled: Removed team check
                            const dx = this.pos.x - s.pos.x;
                            const dy = this.pos.y - s.pos.y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            if (dist < s.radius + this.radius) {
                                if (this.isExplosive || this.isRocket || this.isPlasma) {
                                    this.explode();
                                } else {
                                    s.takeDamage(this.damage);
                                }

                                if (this.isPiercing) {
                                    this.penetration--;
                                    if (this.penetration <= 0) this.active = false;
                                } else {
                                    this.active = false;
                                }
                                break;
                            }
                        }
                    }
                }
            }

            explode() {
                // Reuse Grenade explosion visual or logic?
                // For simplicity, spawn a Grenade object at this location and make it explode instantly
                // or just apply damage here.
                let explosionRadius = this.isNuclear ? 300 : 60;
                let damage = this.isNuclear ? 5000 : 50;

                if (this.isRocket) { explosionRadius = 100; damage = 300; }
                if (this.isPlasma) { explosionRadius = 80; damage = 400; }

                for (let s of game.soldiers) {
                    if (s.active) {
                        const dx = this.pos.x - s.pos.x;
                        const dy = this.pos.y - s.pos.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < explosionRadius) {
                            s.takeDamage(damage);
                        }
                    }
                }
                // Visual effect: We can push a "Grenade" that is already exploded with negative timer
                const g = new Grenade(this.pos.x, this.pos.y, this.pos.x, this.pos.y);
                if (this.isNuclear) g.isNuclear = true;
                if (this.isPlasma) g.isPlasma = true; // Add visual for plasma
                g.explode();
                game.grenades.push(g);
            }

            draw(ctx) {
                if (this.isNuclear) ctx.fillStyle = '#00ff00'; // Green nuke
                else if (this.isPlasma) ctx.fillStyle = 'magenta';
                else if (this.isRocket) ctx.fillStyle = 'darkred';
                else if (this.isFlamethrower) ctx.fillStyle = `rgba(255, 100, 0, ${1 - this.lifeTimer / 40})`;
                else if (this.isHoming) ctx.fillStyle = 'lime';
                else if (this.isPiercing) ctx.fillStyle = 'white';
                else ctx.fillStyle = this.isExplosive ? '#ff4400' : '#ffcc00';

                // Bullet shape
                ctx.beginPath();
                if (this.isRocket || this.isHoming) {
                    // Draw little rocket
                    ctx.save();
                    ctx.translate(this.pos.x, this.pos.y);
                    ctx.rotate(this.angle);
                    ctx.fillStyle = this.isHoming ? 'lime' : '#555';
                    ctx.fillRect(-5, -2, 10, 4);
                    ctx.fillStyle = 'red';
                    ctx.fillRect(0, -2, 5, 4);
                    ctx.restore();
                } else if (this.isPiercing) {
                    // Railgun trail effect
                    ctx.save();
                    ctx.translate(this.pos.x, this.pos.y);
                    ctx.rotate(this.angle);
                    ctx.fillStyle = 'white';
                    ctx.fillRect(-20, -1, 40, 2); // Long beam line
                    ctx.restore();
                } else {
                    ctx.arc(this.pos.x, this.pos.y, this.radius, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        class Grenade {
            constructor(x, y, targetX, targetY, owner) {
                this.pos = { x: x, y: y };
                this.target = { x: targetX, y: targetY };
                this.active = true;
                this.exploded = false;
                this.timer = 60; // Frames until explosion (approx 1 sec)
                this.explosionRadius = 60;
                this.isNuclear = false;
                this.owner = owner;

                // Parabolic movement simulation
                const dx = targetX - x;
                const dy = targetY - y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const steps = 30; // Frames to reach target
                this.velocity = {
                    x: dx / steps,
                    y: dy / steps
                };
                this.stepsRemaining = steps;
            }

            update() {
                if (this.stepsRemaining > 0) {
                    this.pos.x += this.velocity.x;
                    this.pos.y += this.velocity.y;
                    this.stepsRemaining--;

                    // Simple wall bounce could go here, but grenades often go OVER walls in top down.
                    // We'll let them fly over for now.
                } else {
                    this.timer--;
                    if (this.timer <= 0) {
                        this.explode();
                    }
                }
            }

            explode() {
                this.exploded = true;
                // Area Damage
                for (let s of game.soldiers) {
                    if (s.active) {
                        const dx = this.pos.x - s.pos.x;
                        const dy = this.pos.y - s.pos.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < (this.isNuclear ? 300 : this.explosionRadius)) {
                            s.takeDamage(this.isNuclear ? 5000 : 50); // High damage
                        }
                    }
                }

                // Leave explosion visual for a few frames then remove
                this.active = true;
                if (this.timer < -20) this.active = false; // Remove after explosion animation
            }

            draw(ctx) {
                if (this.exploded) {
                    // Draw Explosion
                    let color = `rgba(255, 100, 0, ${1 - (this.timer / -20)})`;
                    if (this.isNuclear) color = `rgba(50, 255, 50, ${1 - (this.timer / -50)})`;
                    if (this.isPlasma) color = `rgba(255, 0, 255, ${1 - (this.timer / -20)})`;

                    ctx.fillStyle = color;
                    ctx.beginPath();
                    ctx.arc(this.pos.x, this.pos.y, this.isNuclear ? 300 : this.explosionRadius, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    // Draw Grenade
                    ctx.fillStyle = '#333';
                    ctx.beginPath();
                    ctx.arc(this.pos.x, this.pos.y, 5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#555';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
            }
        }

        class Mine {
            constructor(x, y, team) {
                this.x = x;
                this.y = y;
                this.team = team;
                this.active = true;
                this.radius = 10;
                this.triggerRadius = 30;
            }

            update() {
                if (!this.active) return;
                // Check collision with enemies
                for (let s of game.soldiers) {
                    if (s.active && s.team !== this.team) {
                        const d = Math.hypot(s.pos.x - this.x, s.pos.y - this.y);
                        if (d < this.triggerRadius + s.radius) {
                            this.explode();
                            break;
                        }
                    }
                }
            }

            explode() {
                this.active = false;
                // Re-use Grenade explosion visual/damage logic
                // Create a dummy grenade active=false but trigger its effect?
                // Or just manual damage loop
                game.soldiers.forEach(s => {
                    const dist = Math.hypot(s.pos.x - this.x, s.pos.y - this.y);
                    if (dist < 100) { // Explosion radius
                        s.takeDamage(100);
                    }
                });

                // Visual effect (Reuse Grenade for now or add Game.explosions later)
                // Just creating a grenade that explodes immediately for visual
                const g = new Grenade(this.x, this.y, this.x, this.y, null);
                g.timer = 0; // Explode next frame
                game.grenades.push(g);
            }

            draw(ctx) {
                if (!this.active) return;
                ctx.fillStyle = 'black';
                ctx.beginPath();
                ctx.arc(this.x, this.y, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = 'red';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.triggerRadius, 0, Math.PI * 2);
                ctx.stroke(); // Draw trigger zone slightly
            }
        }

        class Soldier {
            constructor(x, y, team, isAi) {
                this.pos = { x: x, y: y };
                this.velocity = { x: 0, y: 0 };

                this.isAi = isAi;

                this.active = true;
                this.health = 100;
                this.radius = 15;
                this.speed = 2;

                // Weapon Stats
                this.ammo = 30;
                this.maxAmmo = 30;
                this.grenades = 3;
                this.lastShotTime = 0;
                this.reloading = false;
                this.reloadTime = 2000;
                this.reloadStartTime = 0;

                this.invincibleTimer = 0;

                // Machine Gun check
                this.fireRate = isAi ? 300 : 100;
                if (!isAi && game.hasMachineGun && this.type === 'infantry') {
                    this.fireRate = 50; // Super fast
                    this.maxAmmo = 100;

            }

            transformToNuclearSubmarine() {
                this.type = 'nuke_sub';
                this.health = 20000;
                this.maxAmmo = 99999;
                this.ammo = 99999;
                this.radius = 40;
