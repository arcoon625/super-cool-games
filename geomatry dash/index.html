<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometry Dash Clone</title>
    <!-- Use Google Fonts for a modern, sleek look -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!-- Main Game Canvas -->
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        
        <!-- Score Display -->
        <div id="scoreDisplay">Score: <span>0</span></div>
        <div id="highScoreDisplay">High Score: <span>0</span></div>

        <!-- Start Screen -->
        <div id="startScreen" class="overlay active">
            <h1>NEON DASH</h1>
            <p>Press <kbd>SPACE</kbd> or <kbd>CLICK</kbd> to Jump</p>
            <button id="startBtn">START GAME</button>
        </div>

        <!-- Game Over Screen -->
        <div id="gameOverScreen" class="overlay">
            <h1>GAME OVER</h1>
            <p>Score: <span id="finalScore">0</span></p>
            <button id="restartBtn">RESTART</button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="game.js"></script>
</body>
</html>
