<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower Destroy</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #222;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        canvas {
            background-color: #4a8c3c;
            /* Grass green */
            display: block;
        }

        #ui-layer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100px;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            pointer-events: auto;
        }

        .troop-card {
            width: 70px;
            height: 80px;
            background: #444;
            border: 2px solid #555;
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            user-select: none;
        }

        .troop-card:hover {
            transform: translateY(-5px);
            border-color: #fff;
        }

        .troop-card.selected {
            border-color: #ffd700;
            background: #555;
            box-shadow: 0 0 10px #ffd700;
        }

        .troop-card.locked {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        .troop-name {
            font-size: 10px;
            margin-top: 5px;
            text-align: center;
        }

        .troop-cost {
            color: #d15eff;
            font-weight: bold;
            font-size: 12px;
        }

        #elixir-bar-container {
            position: absolute;
            bottom: 110px;
            left: 10px;
            width: 200px;
            height: 20px;
            background: #000;
            border: 2px solid #fff;
            border-radius: 10px;
            overflow: hidden;
        }

        #elixir-fill {
            height: 100%;
            background: #d15eff;
            width: 50%;
            transition: width 0.2s linear;
        }

        #elixir-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 12px;
            font-weight: bold;
            text-shadow: 1px 1px 1px #000;
        }

        #game-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            text-shadow: 2px 2px 4px #000;
            pointer-events: none;
            display: none;
        }

        #level-info {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 1px 1px 2px #000;
        }
    </style>
</head>

<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="1200" height="800"></canvas>
        <div id="level-info">Level 1</div>
        <div id="elixir-bar-container">
            <div id="elixir-fill"></div>
            <div id="elixir-text">5 / 10</div>
        </div>
        <div id="game-message">VICTORY!</div>
        <div id="ui-layer">
            <!-- Troop cards will be generated here -->
        </div>
    </div>
    <script src="game.js"></script>
</body>

</html>
