<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fish Evolve: Legend of the Deep</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #001e36;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        canvas {
            display: block;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #score-board {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 20px;
            text-shadow: 2px 2px 2px rgba(0, 0, 0, 0.5);
        }

        #evolution-name {
            font-weight: bold;
            color: #4dcfff;
            font-size: 24px;
        }

        .hidden {
            display: none !important;
        }

        #message-area {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            text-align: center;
            text-shadow: 0 0 10px #00ccff;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 0.8;
                transform: translate(-50%, -50%) scale(1);
            }

            50% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.1);
            }

            100% {
                opacity: 0.8;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 3em;
            text-align: center;
            pointer-events: all;
            /* Allow interaction with buttons */
        }

        #game-over-screen h1 {
            color: #ff4d4d;
            margin-bottom: 20px;
        }

        #game-over-screen p {
            font-size: 0.5em;
            margin-bottom: 30px;
        }

        #game-over-screen button {
            padding: 15px 30px;
            font-size: 0.4em;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        #game-over-screen button:hover {
            background-color: #45a049;
        }
    </style>
</head>

<body>
    <div id="ui-layer">
        <div id="score-board">
            <div>Evolution: <span id="evolution-name">Sardine</span></div>
            <div>Mass: <span id="current-mass">0</span> / <span id="next-mass">10</span></div>
        </div>
        <div id="message-area" class="hidden"></div>

        <div id="game-over-screen" class="hidden">
            <h1>GAME OVER</h1>
            <p id="death-reason">You were eaten!</p>
            <button id="restart-btn">Play Again</button>
        </div>
    </div>
    <canvas id="game-canvas"></canvas>
    <script src="entities.js"></script>
    <script src="game.js"></script>
</body>

</html>
